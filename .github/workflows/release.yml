# Publish the askfaro-core crates to crates.io on a version tag.
#
# Releasing is a deliberate act: bump the crate version, then push a `v*` tag
# (e.g. `git tag v0.1.0 && git push origin v0.1.0`). `cargo publish` runs a verify
# build before uploading, so a broken crate never reaches the registry.
#
# One-time setup: add a crates.io API token as the repo secret CARGO_REGISTRY_TOKEN
#   crates.io → Account Settings → API Tokens (scope: publish-new + publish-update)
#   gh secret set CARGO_REGISTRY_TOKEN -R poolside-ventures/askfaro-core
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Tag must match the crate version (guards against a mistagged release).
      - name: Check tag matches crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          crate_ver="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import sys,json; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"]=="askfaro-core-stt"))')"
          tag_ver="${GITHUB_REF_NAME#v}"
          if [ "$crate_ver" != "$tag_ver" ]; then
            echo "::error::tag $tag_ver != askfaro-core-stt crate version $crate_ver" >&2
            exit 1
          fi

      # Publish crates lowest-dependency-first. (One crate today; add more here as
      # the SDK grows — e.g. askfaro-core before crates that depend on it.)
      - name: Publish askfaro-core-stt
        run: cargo publish -p askfaro-core-stt
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
